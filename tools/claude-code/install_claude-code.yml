---
- name: Disable Claude Code git-blocker PreToolUse hook
  hosts: all
  gather_facts: false

  tasks:
    - name: Check if ~/.claude/settings.json exists
      ansible.builtin.stat:
        path: ~/.claude/settings.json
      register: claude_settings_stat

    - name: Remove git-blocker entry from ~/.claude/settings.json
      ansible.builtin.shell: |
        set -eo pipefail
        settings="$HOME/.claude/settings.json"
        has_entry=$(jq -r '
          (.hooks.PreToolUse // [])
          | map(select(
              (.matcher == "Bash")
              and ((.hooks // []) | map(.command) | any(contains("git-blocker.sh")))
            ))
          | length
        ' "$settings")
        if [ "$has_entry" != "0" ]; then
          tmp=$(mktemp)
          jq '
            if .hooks.PreToolUse then
              .hooks.PreToolUse |= map(select(
                (.matcher != "Bash")
                or ((.hooks // []) | map(.command) | any(contains("git-blocker.sh")) | not)
              ))
              | if (.hooks.PreToolUse | length) == 0 then del(.hooks.PreToolUse) else . end
            else . end
          ' "$settings" > "$tmp"
          mv "$tmp" "$settings"
          echo CHANGED
        fi
      register: claude_gitblocker_unwire
      changed_when: "'CHANGED' in claude_gitblocker_unwire.stdout"
      when: claude_settings_stat.stat.exists

- name: Install Claude Code
  hosts: with_ai_tools:&with_login_tools
  gather_facts: true

  tasks:
    - name: Install Claude Code via native installer
      ansible.builtin.shell: curl -fsSL https://claude.ai/install.sh | bash

    - name: Create zsh config directory
      ansible.builtin.file:
        path: ~/.config/zsh
        state: directory

    - name: Install claude-code aliases
      ansible.builtin.copy:
        src: claude-code.zsh
        dest: ~/.config/zsh/claude-code.zsh

    - name: Source claude-code aliases in zshrc
      ansible.builtin.lineinfile:
        path: ~/.zshrc
        line: 'source ~/.config/zsh/claude-code.zsh'
        create: true

    - name: Ensure ~/.config/claude-code exists
      ansible.builtin.file:
        path: ~/.config/claude-code
        state: directory

    - name: Install .worktreeinclude example
      ansible.builtin.copy:
        src: worktreeinclude.example
        dest: ~/.config/claude-code/worktreeinclude.example

    - name: Ensure ~/.claude exists
      ansible.builtin.file:
        path: ~/.claude
        state: directory

    - name: Install global CLAUDE.md
      ansible.builtin.copy:
        src: CLAUDE.md
        dest: ~/.claude/CLAUDE.md

    - name: Install Claude Code statusline script
      ansible.builtin.copy:
        src: statusline.sh
        dest: ~/.claude/statusline.sh
        mode: "0755"
        force: false

    - name: Ensure ~/.claude/skills exists
      ansible.builtin.file:
        path: ~/.claude/skills
        state: directory
        mode: "0755"

    - name: Remove existing skill-creator skill
      ansible.builtin.file:
        path: ~/.claude/skills/skill-creator
        state: absent

    - name: Install skill-creator skill
      ansible.builtin.copy:
        src: skills/skill-creator/
        dest: ~/.claude/skills/skill-creator/
        mode: preserve
        directory_mode: "0755"

    - name: Remove existing create-pr skill
      ansible.builtin.file:
        path: ~/.claude/skills/create-pr
        state: absent

    - name: Install create-pr skill
      ansible.builtin.copy:
        src: skills/create-pr/
        dest: ~/.claude/skills/create-pr/
        mode: preserve
        directory_mode: "0755"

    - name: Remove existing merge-pr skill
      ansible.builtin.file:
        path: ~/.claude/skills/merge-pr
        state: absent

    - name: Install merge-pr skill
      ansible.builtin.copy:
        src: skills/merge-pr/
        dest: ~/.claude/skills/merge-pr/
        mode: preserve
        directory_mode: "0755"

    - name: Ensure ~/.claude/hooks exists
      ansible.builtin.file:
        path: ~/.claude/hooks
        state: directory

    - name: Install Claude Code git-blocker PreToolUse hook
      ansible.builtin.copy:
        src: git-blocker.sh
        dest: ~/.claude/hooks/git-blocker.sh
        mode: "0755"

    - name: Install Claude Code hosts-blocker PreToolUse hook
      ansible.builtin.copy:
        src: hosts-blocker.sh
        dest: ~/.claude/hooks/hosts-blocker.sh
        mode: "0755"

    - name: Ensure ~/.claude/settings.json exists
      ansible.builtin.copy:
        content: "{}\n"
        dest: ~/.claude/settings.json
        force: false

    - name: Wire statusline into ~/.claude/settings.json
      ansible.builtin.shell: |
        set -e
        settings="$HOME/.claude/settings.json"
        target_cmd="$HOME/.claude/statusline.sh"
        current=$(jq -r '.statusLine.command // ""' "$settings")
        if [ "$current" != "$target_cmd" ]; then
          tmp=$(mktemp)
          jq --arg cmd "$target_cmd" \
             '.statusLine = {"type": "command", "command": $cmd}' \
             "$settings" > "$tmp"
          mv "$tmp" "$settings"
          echo CHANGED
        fi
      register: claude_statusline_wire
      changed_when: "'CHANGED' in claude_statusline_wire.stdout"

    - name: Disable auto-memory in ~/.claude/settings.json
      ansible.builtin.shell: |
        set -e
        settings="$HOME/.claude/settings.json"
        current=$(jq -r '.autoMemoryEnabled' "$settings")
        if [ "$current" != "false" ]; then
          tmp=$(mktemp)
          jq '.autoMemoryEnabled = false' "$settings" > "$tmp"
          mv "$tmp" "$settings"
          echo CHANGED
        fi
      register: claude_automemory_wire
      changed_when: "'CHANGED' in claude_automemory_wire.stdout"

    - name: Wire hosts-blocker PreToolUse hook into ~/.claude/settings.json
      ansible.builtin.shell: |
        set -eo pipefail
        settings="$HOME/.claude/settings.json"
        target_cmd="$HOME/.claude/hooks/hosts-blocker.sh"
        matcher="Edit|Write|MultiEdit|Bash"
        has_entry=$(jq --arg cmd "$target_cmd" --arg m "$matcher" -r '
          (.hooks.PreToolUse // [])
          | map(select(
              (.matcher == $m)
              and ((.hooks // []) | map(.command) | any(. == $cmd))
            ))
          | length
        ' "$settings")
        if [ "$has_entry" = "0" ]; then
          tmp=$(mktemp)
          jq --arg cmd "$target_cmd" --arg m "$matcher" '
            .hooks = (.hooks // {})
            | .hooks.PreToolUse = ((.hooks.PreToolUse // []) + [{
                "matcher": $m,
                "hooks": [{"type": "command", "command": $cmd}]
              }])
          ' "$settings" > "$tmp"
          mv "$tmp" "$settings"
          echo CHANGED
        fi
      register: claude_hostsblocker_wire
      changed_when: "'CHANGED' in claude_hostsblocker_wire.stdout"
