---
- name: Install dotfiles self-update cron
  hosts: all
  gather_facts: true

  tasks:
    - name: Deploy self-update script
      ansible.builtin.copy:
        src: self-update.sh
        dest: ~/_dotfiles/tools/self-update/self-update.sh
        mode: "0755"

    - name: Set up cron job to self-update every 2 hours
      ansible.builtin.cron:
        name: "dotfiles self-update"
        minute: "0"
        hour: "*/2"
        job: "~/_dotfiles/tools/self-update/self-update.sh >> /tmp/dotfiles-update.log 2>&1"
